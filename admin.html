<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin SOS Telefono AI</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #06111f, #102a44);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .box {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.12);
      border-radius: 22px;
      padding: 25px;
      text-align: center;
      box-shadow: 0 12px 35px rgba(0,0,0,0.4);
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
    }

    p {
      color: #cfe7ff;
      line-height: 1.5;
    }

    input {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 14px;
      margin: 18px 0;
      font-size: 18px;
      text-align: center;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 15px;
      padding: 16px;
      margin: 8px 0;
      font-size: 17px;
      font-weight: bold;
      color: white;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(0,0,0,0.35);
    }

    button:active {
      transform: scale(0.97);
    }

    .blue {
      background: #0d8bff;
    }

    .red {
      background: #e0002a;
    }

    .gray {
      background: #555;
    }

    .green {
      background: #009e58;
    }

    #msg {
      margin-top: 18px;
      padding: 14px;
      border-radius: 14px;
      background: rgba(0,0,0,0.25);
      min-height: 50px;
      font-size: 15px;
      line-height: 1.5;
    }

    .small {
      margin-top: 18px;
      font-size: 12px;
      color: #b8d8ff;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>🛡️ SOS Telefono AI</h1>

    <p>
      Pannello riservato agli amici autorizzati.<br>
      Inserisci il PIN e scegli un comando.
    </p>

    <input id="pin" type="password" placeholder="Inserisci PIN admin">

    <button class="blue" onclick="inviaComando('request_location')">
      📍 Richiedi posizione
    </button>

    <button class="red" onclick="inviaComando('theft_on')">
      🚨 Attiva Modalità Furto
    </button>

    <button class="gray" onclick="inviaComando('theft_off')">
      🛑 Disattiva Modalità Furto
    </button>

    <button class="green" onclick="controllaStato()">
      🔄 Controlla stato
    </button>

    <div id="msg">
      In attesa di comando...
    </div>

    <div class="small">
      Il PIN non è salvato in questa pagina: viene verificato dal Worker Cloudflare.
    </div>
  </div>

<script>
const WORKER_URL = "https://sos-telefono-ai-worker.vocidicassino.workers.dev";

async function inviaComando(comando) {
  const pin = document.getElementById("pin").value.trim();
  const msg = document.getElementById("msg");

  if (!pin) {
    msg.innerHTML = "❌ Inserisci il PIN admin.";
    return;
  }

  msg.innerHTML = "⏳ Invio comando in corso...";

  try {
    const risposta = await fetch(WORKER_URL + "/command", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        pin: pin,
        command: comando
      })
    });

    const dati = await risposta.json();

    if (!dati.ok) {
      msg.innerHTML = "❌ Errore: " + (dati.error || "comando non riuscito");
      return;
    }

    let testoComando = "";

    if (comando === "request_location") {
      testoComando = "📍 Richiesta posizione inviata";
    }

    if (comando === "theft_on") {
      testoComando = "🚨 Modalità Furto attivata";
    }

    if (comando === "theft_off") {
      testoComando = "🛑 Modalità Furto disattivata";
    }

    msg.innerHTML =
      "✅ " + testoComando + "<br><br>" +
      "Stato attuale: <b>" + dati.state.mode + "</b><br>" +
      "Comando: <b>" + dati.state.command + "</b><br>" +
      "ID comando: " + dati.state.commandId;

  } catch (errore) {
    msg.innerHTML = "❌ Errore collegamento Worker: " + errore.message;
  }
}

async function controllaStato() {
  const msg = document.getElementById("msg");

  msg.innerHTML = "⏳ Controllo stato in corso...";

  try {
    const risposta = await fetch(WORKER_URL + "/state");
    const dati = await risposta.json();

    if (!dati.ok) {
      msg.innerHTML = "❌ Errore nel controllo stato.";
      return;
    }

    msg.innerHTML =
      "📡 Stato sistema<br><br>" +
      "Modalità: <b>" + dati.state.mode + "</b><br>" +
      "Comando: <b>" + dati.state.command + "</b><br>" +
      "ID comando: " + dati.state.commandId + "<br>" +
      "Aggiornato: " + dati.state.updatedAt;

  } catch (errore) {
    msg.innerHTML = "❌ Errore collegamento Worker: " + errore.message;
  }
}
</script>

</body>
</html>
