<!DOCTYPE html>

<html lang="it">

<head>

<meta charset="UTF-8">

<meta name="viewport"

content="width=device-width,initial-scale=1">

<title>Admin SOS Telefono AI</title>

<style>

body{

font-family:Arial;

background:#06111f;

color:white;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

margin:0;

}

.box{

width:360px;

padding:25px;

background:#102840;

border-radius:20px;

text-align:center;

}

input{

width:90%;

padding:14px;

font-size:18px;

border-radius:12px;

border:none;

margin:20px 0;

}

button{

width:100%;

padding:16px;

font-size:18px;

margin:8px 0;

border:none;

border-radius:12px;

cursor:pointer;

color:white;

}

.posizione{

background:#0d8bff;

}

.furto{

background:#e0002a;

}

.stop{

background:#666;

}

#msg{

margin-top:20px;

}

</style>

</head>

<body>

<div class="box">

<h2>🛡️ SOS Telefono AI</h2>

<p>Inserisci PIN</p>

<input

id="pin"

type="password"

placeholder="PIN"

>

<button

class="posizione"

onclick="richiediPosizione()">

📍 Richiedi posizione

</button>

<button

class="furto"

onclick="attivaFurto()">

🚨 Attiva Modalità Furto

</button>

<button

class="stop"

onclick="disattivaFurto()">

🛑 Disattiva Modalità Furto

</button>

<div id="msg"></div>

</div>

<script>

const PIN="4589";

function verifica(){

return document

.getElementById("pin")

.value===PIN;

}

function richiediPosizione(){

if(!verifica()){

document.getElementById("msg")

.innerHTML="❌ PIN errato";

return;

}

document.getElementById("msg")

.innerHTML=

"📍 Richiesta posizione inviata";

}

function attivaFurto(){

if(!verifica()){

document.getElementById("msg")

.innerHTML="❌ PIN errato";

return;

}

document.getElementById("msg")

.innerHTML=

"🚨 Modalità Furto attivata";

}

function disattivaFurto(){

if(!verifica()){

document.getElementById("msg")

.innerHTML="❌ PIN errato";

return;

}

document.getElementById("msg")

.innerHTML=

"🛑 Modalità Furto disattivata";

}

</script>

</body>

</html>
